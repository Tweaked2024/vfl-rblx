<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trophy Room</title>
  <style>
    /* ==========================================
       1. GLOBAL STYLES & THEME
       ========================================== */
    body {
      background-color: #0d0906; /* Deep dark background */
      color: #FFFFFF;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* ==========================================
       2. NAVIGATION BAR STYLING 
       (Replace this CSS with your website's actual navbar CSS if needed)
       ========================================== */
    .navbar {
      background-color: #160f0a; /* Slightly lighter than body */
      border-bottom: 2px solid #24180e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }
    .navbar-logo {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #FFF6F0;
      text-decoration: none;
    }
    .navbar-links {
      display: flex;
      gap: 20px;
    }
    .navbar-links a {
      color: #b5a499;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: color 0.2s ease;
    }
    .navbar-links a:hover, .navbar-links a.active {
      color: #D4A373; /* Accent color */
    }

    /* ==========================================
       3. TROPHY ROOM CONTAINER & HEADER
       ========================================== */
    .trophy-room-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    .back-btn {
      display: inline-block;
      margin-bottom: 24px;
      color: #D4A373;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: color 0.2s ease;
    }
    .back-btn:hover {
      color: #FFF6F0;
      text-decoration: underline;
    }

    .trophy-header-card {
      background: linear-gradient(135deg, #FFF6F0 0%, #F5E8DF 100%);
      border-radius: 20px;
      padding: 35px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #1c120b;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .sub-title {
      color: #D48C45;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 2px;
      display: block;
      margin-bottom: 6px;
    }
    .player-name {
      font-size: 36px;
      font-weight: 900;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    /* ==========================================
       4. TROPHY CASE & DISPLAY GRID
       ========================================== */
    .trophy-case {
      background-color: #160f0a;
      border: 1px solid #24180e;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .case-title {
      font-size: 22px;
      font-weight: 800;
      color: #F1D2B5;
      margin-top: 0;
      margin-bottom: 25px;
      border-bottom: 1px solid #24180e;
      padding-bottom: 12px;
    }
    .trophy-shelf {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }
    .trophy-item {
      background-color: #1e150f;
      border: 1px solid #2e1f15;
      border-radius: 12px;
      padding: 24px 15px;
      text-align: center;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .trophy-item:hover {
      transform: translateY(-5px);
      border-color: #D4A373;
    }
    .trophy-icon {
      font-size: 44px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }
    .trophy-label {
      background-color: #D4A373;
      color: #1c120b;
      font-weight: 800;
      font-size: 11px;
      border-radius: 4px;
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <!-- ==========================================
       NAVIGATION BAR 
       (Replace this entire <nav> block with the one from your home/stats page!)
       ========================================== -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">TWEAKED TV</a>
    <div class="navbar-links">
      <a href="index.html">Home</a>
      <a href="stats.html" class="active">Stats</a>
      <a href="appeals.html">Ban Appeals</a>
    </div>
  </nav>

  <!-- ==========================================
       MAIN CONTENT
       ========================================== -->
  <div class="trophy-room-container">
    <!-- Back to stats link -->
    <a href="stats.html" class="back-btn">← Back to Stats Leaderboard</a>

    <!-- Player Profile Header -->
    <div class="trophy-header-card">
      <div>
        <span class="sub-title">OFFICIAL PLAYER ACCOUNT</span>
        <h1 id="display-name" class="player-name">LOADING PLAYER...</h1>
      </div>
    </div>

    <!-- Trophy Shelf Case -->
    <div class="trophy-case">
      <h3 class="case-title">Championships & Awards</h3>
      <div class="trophy-shelf">
        
        <!-- Trophy 1 -->
        <div class="trophy-item">
          <span class="trophy-icon">🏆</span>
          <div class="trophy-label">CHAMPION</div>
        </div>
        
        <!-- Trophy 2 -->
        <div class="trophy-item">
          <span class="trophy-icon">⭐</span>
          <div class="trophy-label">MVP</div>
        </div>

        <!-- Trophy 3 -->
        <div class="trophy-item">
          <span class="trophy-icon">🎯</span>
          <div class="trophy-label">SHARPSHOOTER</div>
        </div>

      </div>
    </div>
  </div>

  <!-- ==========================================
       DYNAMIC SCRIPT (Reads user from URL)
       ========================================== -->
  <script>
    // Extract the ?player=NAME parameter from the address bar
    const urlParams = new URLSearchParams(window.location.search);
    const player = urlParams.get('player');

    // Dynamically insert the name or display a placeholder if accessed directly
    if (player) {
      document.getElementById('display-name').textContent = decodeURIComponent(player);
    } else {
      document.getElementById('display-name').textContent = "GUEST PLAYER";
    }
  </script>

</body>
</html>
