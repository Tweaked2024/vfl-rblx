<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trophy Room</title>
  <style>
    :root {
      --bg-main: #111017;
      --bg-card: #1b1a25;
      --accent: #f05d51;
      --text-main: #ffffff;
      --text-muted: #8b8a99;
      --border: #282735;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #f3f3f3;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    nav {
      background-color: var(--bg-main);
      padding: 1.2rem 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1000;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-circle {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .logo-text {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .logo-text span {
      display: block;
      color: var(--text-muted);
      font-size: 0.7rem;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 2rem;
      align-items: center;
    }

    nav ul li {
      position: relative !important;
      display: inline-block;
    }

    nav ul li a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s ease;
    }

    nav ul li a:hover,
    nav ul li a.active {
      color: var(--text-main);
    }

    .dropdown-menu {
      display: none !important;
      visibility: hidden;
      opacity: 0;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background-color: #ffffff;
      min-width: 210px;
      border-radius: 12px;
      padding: 0.6rem 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      list-style: none !important;
      margin-top: 5px;
      z-index: 99999;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
    }

    nav ul li.dropdown:hover .dropdown-menu {
      display: block !important;
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(0px);
    }

    .dropdown-menu li {
      width: 100%;
      display: block;
    }

    .dropdown-menu li a {
      color: #111017 !important;
      padding: 0.7rem 1.4rem;
      display: block !important;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: none !important;
      text-decoration: none;
      text-align: left;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .dropdown-menu li a:hover {
      background-color: #f4f4f6 !important;
      color: var(--accent) !important;
    }

    nav ul li.dropdown:hover .nav-arrow {
      transform: rotate(180deg);
    }

    .nav-btn {
      background-color: var(--accent);
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .page {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 20px 30px;
      width: 100%;
    }

    .top-card {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      color: #111;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #e9d2a8;
      background: #ddd;
    }

    .name-area {
      flex: 1;
      min-width: 240px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b58b44;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .player-name {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      background: #f6f1e8;
      border: 1px solid #e7dcc8;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .stat .val {
      display: block;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
      color: #111;
    }

    .stat .lbl {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      color: #777;
      margin-top: 4px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      background: #f4e6d2;
      color: #6c4d19;
      border: 1px solid #d8c2a1;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .cabinet {
      background: #1c120d;
      color: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }

    .shelf {
      background: linear-gradient(180deg, #24160f, #1a100b);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .shelf-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
    }

    .shelf-title {
      margin: 0;
      font-size: 18px;
      color: #f2d6a2;
    }

    .shelf-count {
      font-size: 12px;
      color: #f0c46d;
      background: rgba(240,196,109,.14);
      border: 1px solid rgba(240,196,109,.35);
      padding: 5px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .trophy {
      position: relative;
      width: 120px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      color: #fff;
      transition: transform 0.25s ease, box-shadow 0.25s ease, z-index 0.25s ease;
    }
    
    .trophy:hover {
      transform: translateY(-10px) scale(1.04);
      z-index: 20;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
    }
    
    .trophy img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      display: block;
      margin: 0 auto 8px;
    }
    
    .trophy .title {
      font-size: 12px;
      font-weight: 800;
      margin: 0;
    }
    
    .trophy .sub {
      font-size: 10px;
      color: #d7c29a;
      margin-top: 4px;
    }

    @media (max-width: 700px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .player-name {
        font-size: 32px;
      }

      nav {
        flex-wrap: wrap;
        gap: 12px;
      }

      nav ul {
        flex-wrap: wrap;
        gap: 1rem;
      }
    }
  </style>
