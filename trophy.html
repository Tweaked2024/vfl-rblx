        var deck = el('div', 'shelf-deck');
        var row = el('div', 'shelf-row');
        items.sort(function (a, b) { return a.seasonNum - b.seasonNum; });
        items.forEach(function (t) { row.appendChild(buildTrophy(t)); });
        deck.appendChild(row);
        deck.appendChild(el('div', 'shelf-plank'));
        shelf.appendChild(deck);
        return shelf;
      }

      function buildMilestones(byGroup, trophies) {
        var chips = [];
        function add(icon, label) { chips.push({ icon: icon, label: label }); }
        var rings = (byGroup.ring || []).length;
        var mvps = trophies.filter(function (t) { return t.code === 'MVP'; }).length;
        var allpro = (byGroup.allpro || []).length;
        var star = (byGroup.star || []).length;
        var conf = (byGroup.conf || []).length;

        if (rings) add('\uD83D\uDC8D', rings + '\u00D7 Allegiance Bowl Champion');
        if (mvps) add(mvps + '\u00D7 MVP');
        if (conf) add(conf + '\u00D7 Conference Champion');
        if (allpro) add(allpro + '\u00D7 All-Pro');
        if (star) add(star + '\u00D7 Star Bowl');
        return chips;
      }

      function render(id, name, trophies) {
        root.innerHTML = '';

        var byGroup = {};
        trophies.forEach(function (t) { (byGroup[t.group] = byGroup[t.group] || []).push(t); });
        var totalXp = trophies.reduce(function (s, t) { return s + t.xp; }, 0);
        var champs = (byGroup.ring || []).length;
        var honors = (byGroup.top || []).length + (byGroup.annual || []).length;

        /* hero */
        var hero = el('div', 'tr-hero');
        var av = el('img', 'tr-hero-avatar');
        av.alt = name;
        av.onerror = function () { this.style.visibility = 'hidden'; };
        hero.appendChild(av);

        var hinfo = el('div', 'tr-hero-info');
        hinfo.appendChild(el('p', 'tr-hero-eyebrow', 'Trophy Room'));
        hinfo.appendChild(el('h1', 'tr-hero-name', name));

        var stats = el('div', 'tr-hero-stats');
        [[trophies.length, 'Trophies'], [champs, 'Championships'],
         [honors, 'Honors'], [totalXp.toLocaleString('en-US'), 'Trophy XP']]
          .forEach(function (s) {
            var tile = el('div', 'tr-stat');
            tile.appendChild(el('span', 'tr-stat-val', String(s[0])));
            tile.appendChild(el('span', 'tr-stat-lbl', s[1]));
            stats.appendChild(tile);
          });
        hinfo.appendChild(stats);

        var chips = buildMilestones(byGroup, trophies);
        if (chips.length) {
          var chipWrap = el('div', 'tr-milestones');
          chips.forEach(function (c) {
            var chip = el('span', 'tr-chip');
            chip.appendChild(el('span', 'tr-chip-icon', c.icon));
            chip.appendChild(el('span', null, c.label));
            chipWrap.appendChild(chip);
          });
          hinfo.appendChild(chipWrap);
        }

        var actions = el('div', 'tr-actions');
        var stat = el('a', 'tr-btn tr-btn-primary', 'View Career Stats \u2192');
        stat.href = '/alltime/player/?id=' + encodeURIComponent(id) +
          (name ? '&u=' + encodeURIComponent(name) : '');
        actions.appendChild(stat);
        var back = el('a', 'tr-btn tr-btn-ghost', '\u2190 All-Time');
        back.href = '/alltime/';
        actions.appendChild(back);
        hinfo.appendChild(actions);

        hero.appendChild(hinfo);
        root.appendChild(hero);

        AT.fetchAvatarsByIds([id]).then(function (map) { if (map[id]) av.src = map[id]; });

        if (!trophies.length) {
          var empty = el('div', 'tr-empty');
          empty.appendChild(el('div', 'tr-empty-icon', '\uD83C\uDFC6'));
          empty.appendChild(el('h2', 'tr-empty-title', 'The case is empty \u2014 for now'));
          empty.appendChild(el('p', 'tr-empty-text',
            'No awards, championships or honors are recorded for ' + name + ' yet. There\u2019s a whole cabinet waiting to be filled.'));
          root.appendChild(empty);
          return;
        }

        var cabinet = el('div', 'cabinet');
        GROUPS.forEach(function (g) {
          var items = byGroup[g.key];
          if (items && items.length) cabinet.appendChild(buildShelf(g, items));
        });
        root.appendChild(cabinet);
      }

      /* ---------------- load ---------------- */
      function showMessage(msg) {
        root.innerHTML = '';
        root.appendChild(el('p', 'tr-loading', msg));
      }

      function loadFor(id, name) {
        showMessage('Opening the trophy room\u2026');
        AT.getJSON(AT.batchUrl([AWARDS_RANGE]))
          .then(function (data) {
            var vr = (data.valueRanges || [])[0] || {};
            var rows = vr.values || [];
            var trophies = parseTrophies(rows, String(id).trim(), (name || '').trim().toLowerCase());
            render(String(id).trim(), name || ('Player ' + id), trophies);
          })
          .catch(function (e) {
            console.error('Trophy room error:', e);
            showMessage('Could not load the trophy room right now. Please try again later.');
          });
      }

      function init() {
        document.addEventListener('click', closeAll);
        var id = getParam('id').trim();
        var uname = getParam('u').trim();
        if (id) {
          loadFor(id, uname);
        } else if (uname) {
          showMessage('Looking up \u201c' + uname + '\u201d\u2026');
          AT.usernameToId(uname).then(function (resolved) {
            if (!resolved) { showMessage('No Roblox account found for \u201c' + uname + '\u201d.'); return; }
            loadFor(resolved, uname);
          }).catch(function () { showMessage('Could not reach Roblox right now. Please try again.'); });
        } else {
          showMessage('No player selected. Open a trophy room from an all-time player profile.');
        }
      }

      init();
    })();
  </script>
</body>
</html>
