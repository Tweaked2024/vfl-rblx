<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trophy Room</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      color: #111;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .top-card {
      background: #fff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #e9d2a8;
      background: #ddd;
    }

    .name-area {
      flex: 1;
      min-width: 240px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b58b44;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .player-name {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      background: #f6f1e8;
      border: 1px solid #e7dcc8;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .stat .val {
      display: block;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
    }

    .stat .lbl {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      color: #777;
      margin-top: 4px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      background: #f4e6d2;
      color: #6c4d19;
      border: 1px solid #d8c2a1;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .cabinet {
      background: #1c120d;
      color: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }

    .shelf {
      background: linear-gradient(180deg, #24160f, #1a100b);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .shelf-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
    }

    .shelf-title {
      margin: 0;
      font-size: 18px;
      color: #f2d6a2;
    }

    .shelf-count {
      font-size: 12px;
      color: #f0c46d;
      background: rgba(240,196,109,.14);
      border: 1px solid rgba(240,196,109,.35);
      padding: 5px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .trophy {
      width: 120px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      color: #fff;
    }

    .trophy img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      display: block;
      margin: 0 auto 8px;
    }

    .trophy .title {
      font-size: 12px;
      font-weight: 800;
      margin: 0;
    }

    .trophy .sub {
      font-size: 10px;
      color: #d7c29a;
      margin-top: 4px;
    }

    @media (max-width: 700px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .player-name {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-card">
      <img id="player-avatar" class="avatar" src="" alt="player avatar" />
      <div class="name-area">
        <p class="eyebrow">Trophy Room</p>
        <h1 id="player-name" class="player-name">PLAYER</h1>

        <div class="stats">
          <div class="stat"><span id="stat-trophies" class="val">0</span><span class="lbl">Trophies</span></div>
          <div class="stat"><span id="stat-champs" class="val">0</span><span class="lbl">Championships</span></div>
          <div class="stat"><span id="stat-honors" class="val">0</span><span class="lbl">Honors</span></div>
          <div class="stat"><span id="stat-xp" class="val">0</span><span class="lbl">Trophy XP</span></div>
        </div>

        <div id="chips" class="chips"></div>
      </div>
    </div>

    <div class="cabinet" id="shelves"></div>
  </div>

  <script>
    const players = {
      FINLEY4K: {
        name: "FINLEY4K",
        avatar: "https://tr.rbxcdn.com/30DAY-AvatarHeadshot-0447FDAAA17F47D7EB81F2E0BA7F6EEC-Png/150/150/AvatarHeadshot/Png/isCircular",
        trophies: 38,
        championships: 6,
        honors: 4,
        xp: "17,250",
        chips: ["6× Allegiance Bowl Champion", "2× MVP", "6× Conference Champion", "5× All-Pro", "12× Star Bowl"],
        shelves: [
          { title: "Allegiance Bowls", count: 6, items: 6 },
          { title: "Conference Championships", count: 6, items: 6 },
          { title: "Top Honors", count: 3, items: 3 }
        ]
      },
      JACKSON: {
        name: "JACKSON",
        avatar: "https://via.placeholder.com/150",
        trophies: 12,
        championships: 2,
        honors: 3,
        xp: "4,200",
        chips: ["2× Champion", "1× MVP", "3× All-Pro"],
        shelves: [
          { title: "Championships", count: 2, items: 2 },
          { title: "Awards", count: 3, items: 3 }
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const key = (params.get("player") || "FINLEY4K").toUpperCase();
    const player = players[key] || players.FINLEY4K;

    document.getElementById("player-avatar").src = player.avatar;
    document.getElementById("player-avatar").alt = player.name;
    document.getElementById("player-name").textContent = player.name;
    document.getElementById("stat-trophies").textContent = player.trophies;
    document.getElementById("stat-champs").textContent = player.championships;
    document.getElementById("stat-honors").textContent = player.honors;
    document.getElementById("stat-xp").textContent = player.xp;

    const chips = document.getElementById("chips");
    chips.innerHTML = player.chips.map(chip => `<span class="chip">${chip}</span>`).join("");

    const shelves = document.getElementById("shelves");
    shelves.innerHTML = player.shelves.map(shelf => `
      <section class="shelf">
        <div class="shelf-head">
          <h2 class="shelf-title">${shelf.title}</h2>
          <span class="shelf-count">${shelf.count} trophies</span>
        </div>
        <div class="row">
          ${Array.from({ length: shelf.items }).map(() => `
            <div class="trophy">
              <img src="trophy.png" alt="trophy">
              <div class="title">TROPHY</div>
              <div class="sub">Season Win</div>
            </div>
          `).join("")}
        </div>
      </section>
    `).join("");
  </script>
</body>
</html>
