<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trophy Room</title>
    <style>
        :root {
            --bg-deep: #110f0e;
            --card-bg: #1e1b1a;
            --gold-text: #f1d2b5;
            --gold-border: #3d352e;
            --accent-red: #ff6b6b;
        }

        body { background-color: var(--bg-deep); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* Navbar */
        nav { background-color: #000; padding: 1.2rem 4%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold-border); }
        .nav-logo { font-weight: 900; color: white; text-decoration: none; font-size: 1.2rem; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 1.5rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }

        /* Container */
        .page-container { max-width: 1000px; margin: 2rem auto; padding: 0 20px; }

        /* Header Card */
        .header-card { background: #fff; border-radius: 16px; padding: 2rem; text-align: center; margin-bottom: 2rem; color: #111; }
        .player-name { font-size: 2.5rem; font-weight: 900; margin: 0.5rem 0; text-transform: uppercase; }

        /* Section Layout */
        .trophy-case-section { background: var(--card-bg); border: 1px solid var(--gold-border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; }
        .section-title { color: var(--gold-text); font-size: 1.2rem; font-weight: 800; margin-bottom: 1.5rem; text-transform: uppercase; border-bottom: 1px solid var(--gold-border); padding-bottom: 10px; }

        /* Trophy Grid */
        .trophy-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .trophy-box { text-align: center; width: 100px; }
        .trophy-image { width: 80px; height: 80px; background: #2a2523; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .trophy-tag { background: var(--gold-border); color: var(--gold-text); font-size: 0.65rem; font-weight: 700; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">TWEAKED TV</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="stats.html" class="active">Stats</a>
            <a href="appeals.html">Ban Appeals</a>
        </div>
    </nav>

    <div class="page-container">
        <div class="header-card">
            <div style="color: var(--accent-red); font-size: 0.7rem; font-weight: 800; letter-spacing: 2px;">TROPHY ROOM</div>
            <h1 id="display-name" class="player-name">LOADING...</h1>
        </div>

        <!-- Section Template -->
        <div class="trophy-case-section">
            <h2 class="section-title">Championships & Awards</h2>
            <div class="trophy-grid">
                <div class="trophy-box">
                    <div class="trophy-image">🏆</div>
                    <div class="trophy-tag">CHAMPION</div>
                </div>
                <div class="trophy-box">
                    <div class="trophy-image">⭐</div>
                    <div class="trophy-tag">MVP</div>
                </div>
                <div class="trophy-box">
                    <div class="trophy-image">🎯</div>
                    <div class="trophy-tag">SHARPSHOOTER</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const player = urlParams.get('player');
        document.getElementById('display-name').textContent = player ? decodeURIComponent(player) : "GUEST PLAYER";
    </script>
</body>
</html>
