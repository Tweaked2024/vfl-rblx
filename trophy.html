<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trophy Room</title>
    <style>
        :root {
            --bg-body: #111017;
            --card-bg: #1a191f;
            --text-main: #ffffff;
            --accent-red: #ff6b6b;
            --gold-text: #d4af37;
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* Navigation - Matches Reference */
        .navbar {
            background-color: #111017;
            padding: 1rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-circle { width: 35px; height: 35px; background: var(--accent-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.7rem; }
        .logo-text { font-size: 0.8rem; font-weight: 800; line-height: 1.1; text-transform: uppercase; }
        .logo-text span { display: block; color: #888; font-size: 0.65rem; }
        
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #ffffff; text-decoration: none; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .join-btn { background: var(--accent-red); color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 0.75rem; font-weight: 700; }

        /* Page Layout */
        .page-container { max-width: 1000px; margin: 2rem auto; padding: 0 20px; }
        .header-card { background: #ffffff; border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 2rem; color: #111; }
        .player-name { font-size: 2.5rem; font-weight: 900; margin: 0.5rem 0; text-transform: uppercase; }

        /* Section Styling - Matching Background */
        .trophy-case-section { background: var(--card-bg); border-radius: 8px; padding: 2rem; margin-bottom: 2rem; }
        .section-title { color: #d4af37; font-size: 0.9rem; font-weight: 800; margin-bottom: 1.5rem; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .trophy-grid { display: flex; flex-wrap: wrap; gap: 30px; }
        .trophy-container { position: relative; text-align: center; width: 80px; }
        .trophy-main-img { width: 60px; height: 60px; }
        .trophy-tag { background: #333; color: #ddd; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-top: 8px; display: inline-block; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area">
            <div class="logo-circle">VFL</div>
            <div class="logo-text">Virtual Football<span>League • Season 6</span></div>
        </div>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="scores.html">Scores</a></li>
            <li><a href="standings.html">Standings</a></li>
            <li><a href="stats.html">Stats</a></li>
            <li class="dropdown">
                <a href="#">
                    Legacy
                    <svg class="nav-arrow" width="10" height="6" viewBox="0 0 10 6" fill="currentColor" style="transition: transform 0.2s ease; margin-left: 2px;">
                        <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </a>
                <ul class="dropdown-menu">
                    <li><a href="legacy.html">Legacy</a></li>
                    <li><a href="champions-awards.html">Champions & Awards</a></li>
                    <li><a href="award-tracker.html">Award Tracker</a></li>
                </ul>
            </li>
            <li><a href="rulebook.html">Rulebook</a></li>
        </ul>
        <a href="#" class="nav-btn">Join Now!</a>
    </nav>

    <div class="page-container">
        <div class="header-card">
            <div style="color: var(--accent-red); font-size: 0.6rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">Trophy Room</div>
            <h1 id="display-name" class="player-name">LOADING...</h1>
        </div>

        <div class="trophy-case-section">
            <h2 class="section-title">Championships & Awards</h2>
            <div class="trophy-grid">
                <div class="trophy-container">
                    <img src="trophy.png" class="trophy-main-img" alt="Trophy">
                    <div class="trophy-tag">CHAMPION</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const player = urlParams.get('player');
        document.getElementById('display-name').textContent = player ? decodeURIComponent(player) : "GUEST PLAYER";
    </script>
</body>
</html>
