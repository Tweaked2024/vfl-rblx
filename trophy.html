<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFL Trophy Room</title>
    <style>
        :root {
            /* Shared Theme Tokens */
            --bg-main: #1c130b; 
            --text-main: #ffffff;
            --text-muted: #b89b76;
            --accent: #e51c35;
            --accent-hover: #b81427;
            --border: #3c2a18;
            
            --color-neutral-100: #f5f5f5;
            --color-neutral-200: #e5e5e5;
            --color-neutral-300: #d4d4d4;
            --color-neutral-900: #171717;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        
        /* Navigation Header */
        nav { 
            background-color: var(--bg-main); 
            padding: 1.2rem 4%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            position: relative;
            z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-circle { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .logo-text { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; line-height: 1.2; }
        .logo-text span { display: block; color: var(--text-muted); font-size: 0.7rem; }
        
        nav ul { display: flex; list-style: none; gap: 2rem; align-items: center; margin: 0; padding: 0; }
        nav ul li { position: relative; display: inline-block; }
        
        nav ul li a { 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            padding: 0.5rem 0;
            transition: color 0.2s ease; 
        }
        nav ul li a:hover, nav ul li a.active { color: var(--text-main); }
        
        /* Dropdown Structure Fixes */
        .dropdown-menu { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 50%; 
            transform: translateX(-50%) translateY(10px); 
            background: #ffffff; 
            min-width: 200px;
            border-radius: 12px; 
            padding: 0.6rem 0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            list-style: none; 
            margin: 0;
            margin-top: 5px;
            z-index: 9999; 
        }
        nav ul li.dropdown:hover .dropdown-menu { 
            display: block; 
        }
        .dropdown-menu li { width: 100%; display: block; }
        .dropdown-menu li a { 
            color: var(--color-neutral-900) !important; 
            padding: 0.7rem 1.4rem; 
            display: block;
            text-transform: none;
            transition: background-color 0.15s ease, color 0.15s ease;
        }
        .dropdown-menu li a:hover {
            background-color: var(--color-neutral-100);
            color: var(--accent) !important;
        }
        
        /* Icon Interaction Elements */
        .nav-arrow { transition: transform 0.2s ease; }
        nav ul li.dropdown:hover .nav-arrow { transform: rotate(180deg); }

        .nav-btn { 
            background-color: var(--accent); 
            color: white; 
            padding: 0.5rem 1.2rem; 
            border-radius: 20px; 
            text-decoration: none; 
            font-size: 0.8rem; 
            font-weight: 700; 
            transition: background-color 0.2s ease;
        }
        .nav-btn:hover { background-color: var(--accent-hover); }

        /* Trophy Room Styles */
        .trophy-room { padding-block: 3rem; }
        .trophy-room .container { max-width: 1180px; margin: 0 auto; padding-inline: 1rem; }
        .cabinet {
            margin-top: 2rem; display: flex; flex-direction: column; gap: 1.4rem; padding: 1.6rem;
            border-radius: 1.25rem; background: var(--bg-main);
            border: 1px solid var(--border); 
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6);
        }
        .shelf { border-radius: 0.9rem; padding: 1.15rem; background: linear-gradient(180deg, rgba(10, 7, 4, 0.65), rgba(10, 7, 4, 0.2)); border: 1px solid var(--border); }
        .shelf-row { display: flex; gap: 1.4rem; min-height: 150px; align-items: flex-end; }
        .trophy { cursor: pointer; background: transparent; border: 0; width: 120px; padding: 0; transition: transform 0.2s ease; }
        .trophy:hover { transform: scale(1.05); }
        .trophy-photo { height: 120px; width: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area">
            <div class="logo-circle">VFL</div>
            <div class="logo-text">Virtual Football<span>League • Season 6</span></div>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="scores.html">Scores</a></li>
            <li><a href="standings.html">Standings</a></li>
            <li><a href="stats.html">Stats</a></li>
            <li class="dropdown">
                <a href="#">Legacy <svg class="nav-arrow" width="10" height="6" viewBox="0 0 10 6" fill="currentColor"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></a>
                <ul class="dropdown-menu">
                    <li><a href="legacy.html">Legacy</a></li>
                    <li><a href="champions-awards.html">Champions & Awards</a></li>
                    <li><a href="award-tracker.html">Award Tracker</a></li>
                </ul>
            </li>
            <li><a href="rulebook.html">Rulebook</a></li>
        </ul>
        <a href="#" class="nav-btn">Join Now!</a>
    </nav>
    
    <section class="trophy-room">
        <div class="container">
            <main class="cabinet" id="trophy-root">
                <section class="shelf">
                    <div class="shelf-row">
                        <button class="trophy">
                            <img src="lombardi.png" class="trophy-photo" alt="Championship">
                        </button>
                    </div>
                </section>
            </main>
        </div>
    </section>

</body>
</html>
