<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trophy Room</title>
    <style>
        /* 1. GLOBAL VARIABLES - Matches your main site */
        :root {
            --bg-main: #111017;
            --bg-card: #1b1a25;
            --border: #282735;
            --text-main: #ffffff;
            --text-muted: #b0afb8;
            --accent: #ff6b6b;
        }

        body { background-color: var(--bg-main); color: var(--text-main); font-family: sans-serif; margin: 0; }

        /* 2. SHARED NAVBAR */
        nav { background-color: var(--bg-main); padding: 1.2rem 4%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .nav-logo { font-weight: 900; color: white; text-decoration: none; font-size: 1.2rem; }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 1.5rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .nav-links a.active { color: var(--text-main); }

        /* 3. LAYOUT */
        .page-container { max-width: 1000px; margin: 3rem auto; padding: 0 2rem; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 0.9rem; font-weight: 700; margin-bottom: 2rem; display: inline-block; }

        /* 4. CARDS (Matching your VFL site look) */
        .header-card { background: var(--bg-card); border: 1px solid var(--border); padding: 2rem; border-radius: 12px; text-align: center; margin-bottom: 2rem; }
        .player-name { font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0; }
        .awards-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; }
        .awards-title { font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 1rem; }
        
        .trophy-shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .trophy-item { background: #232231; border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; text-align: center; }
        .trophy-icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .trophy-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">TWEAKED TV</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="stats.html" class="active">Stats</a>
            <a href="appeals.html">Ban Appeals</a>
        </div>
    </nav>

    <div class="page-container">
        <a href="stats.html" class="back-link">← Back to Stats Leaderboard</a>

        <div class="header-card">
            <div style="color: var(--accent); font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;">OFFICIAL PLAYER ACCOUNT</div>
            <h1 id="display-name" class="player-name">LOADING...</h1>
        </div>

        <div class="awards-card">
            <h3 class="awards-title">Championships & Awards</h3>
            <div class="trophy-shelf">
                <div class="trophy-item"><span class="trophy-icon">🏆</span><div class="trophy-label">CHAMPION</div></div>
                <div class="trophy-item"><span class="trophy-icon">⭐</span><div class="trophy-label">MVP</div></div>
                <div class="trophy-item"><span class="trophy-icon">🎯</span><div class="trophy-label">SHARPSHOOTER</div></div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const player = urlParams.get('player');
        document.getElementById('display-name').textContent = player ? decodeURIComponent(player) : "GUEST PLAYER";
    </script>
</body>
</html>
