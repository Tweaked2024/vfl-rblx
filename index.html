<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFL Roblox - Home</title>
    <style>
        :root {
            --bg-main: #111017;
            --bg-card: #1b1a25;
            --accent: #f05d51;
            --accent-hover: #d44d42;
            --text-main: #ffffff;
            --text-muted: #8b8a99;
            --border: #282735;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation Header Base */
        nav { 
            background-color: var(--bg-main); 
            padding: 1.2rem 4%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            position: relative;
            z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-circle { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; }
        .logo-text { font-size: 0.85rem; font-weight: 700; line-height: 1.2; text-transform: uppercase; }
        .logo-text span { display: block; color: var(--text-muted); font-size: 0.7rem; }
        
        /* Navigation Menu Lists */
        nav ul { display: flex; list-style: none; gap: 2rem; align-items: center; }
        nav ul li { position: relative !important; display: inline-block; }
        
        nav ul li a { 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
        }
        nav ul li a:hover, nav ul li a.active { 
            color: var(--text-main); 
        }

        /* Pure Floating Dropdown Box Design */
        .dropdown-menu {
            display: none !important;
            visibility: hidden;
            opacity: 0;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background-color: #ffffff;
            min-width: 210px;
            border-radius: 12px;
            padding: 0.6rem 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            list-style: none !important;
            margin-top: 5px;
            z-index: 99999;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }

        /* Displays only on hover state */
        nav ul li.dropdown:hover .dropdown-menu {
            display: block !important;
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0px);
        }

        /* Dropdown Item Typography & Link Actions */
        .dropdown-menu li { width: 100%; display: block; }
        .dropdown-menu li a {
            color: #111017 !important;
            padding: 0.7rem 1.4rem;
            display: block !important;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: none !important;
            text-decoration: none;
            text-align: left;
            transition: background-color 0.15s ease, color 0.15s ease;
        }
        .dropdown-menu li a:hover { 
            background-color: #f4f4f6 !important;
            color: var(--accent) !important; 
        }

        /* Animates down arrow turn on hover */
        nav ul li.dropdown:hover .nav-arrow {
            transform: rotate(180deg);
        }

        .nav-btn { background-color: var(--accent); color: white; padding: 0.5rem 1.2rem; border-radius: 20px; text-decoration: none; font-size: 0.8rem; font-weight: 700; transition: background 0.2s; }
        .nav-btn:hover { background-color: var(--accent-hover); }

        /* Hero Banner Section */
        .hero { position: relative; height: 320px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 1rem; }
        .hero h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 1rem; text-transform: uppercase; }
        .hero-btn { background-color: var(--accent); color: white; padding: 0.7rem 1.8rem; border-radius: 20px; text-decoration: none; font-weight: 700; font-size: 0.9rem; }

        /* Main Content Container */
        .container { max-width: 1200px; margin: 3rem auto; padding: 0 2rem; width: 100%; flex: 1; display: flex; justify-content: center; }
        .matchup-panel { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 500px; padding: 2rem; height: 350px; }
        .matchup-panel h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.8rem; border-bottom: 2px solid #3d3b4f; padding-bottom: 0.8rem; }

        /* Highlight Callout Footer Section */
        .join-footer { background-color: var(--accent); color: #111017; padding: 2.5rem 4%; display: flex; justify-content: space-between; align-items: center; }
        .join-footer h2 { font-size: 1.8rem; font-weight: 700; text-transform: lowercase; }
        .join-footer .footer-btn { background-color: #2b2726; color: white; padding: 0.7rem 1.8rem; border-radius: 20px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1); }

        /* Legal Footer */
        footer { background-color: #1a1922; color: var(--text-muted); padding: 1.5rem 4%; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; border-top: 1px solid var(--border); margin-top: auto; }
    </style>
</head>
